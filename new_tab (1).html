<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Proxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 
<canvas id="city-canvas"></canvas>
 
<!-- Context menu -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-edit">✏️ Edit Shortcut</div>
  <div class="ctx-item" id="ctx-remove">🗑️ Remove</div>
</div>
 
<!-- Edit modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">Edit Shortcut</div>
    <label>Name</label>
    <input id="modal-name" type="text" placeholder="Shortcut name" autocomplete="off" spellcheck="false">
    <label>URL</label>
    <input id="modal-url" type="text" placeholder="https://example.com" autocomplete="off" spellcheck="false">
    <div id="modal-btns">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save">Save</button>
    </div>
  </div>
</div>
 
<div id="toast"></div>
 
<!-- Browser chrome -->
<div class="browser-chrome">
 
  <!-- Tab bar -->
  <div class="tab-bar" id="tab-bar">
    <!-- Tabs injected by JS -->
    <div class="tab-add" id="btn-new-tab" title="New tab">+</div>
  </div>
 
  <!-- Nav bar -->
  <div class="nav-bar">
    <div class="nav-btn disabled" id="btn-back" title="Go back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <div class="nav-btn disabled" id="btn-forward" title="Go forward">
      <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </div>
    <div class="nav-btn" id="btn-reload" title="Reload page">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </div>
    <div class="address-bar" id="nav-address-bar" title="Click to search">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <span id="nav-address-text">Search with Google or enter address</span>
    </div>
    <div class="nav-right">
      <div class="nav-btn" id="btn-search-icon" title="Search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </div>
      <div class="nav-btn" id="btn-menu" title="More options">
        <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </div>
    </div>
  </div>
</div>
 
<!-- Page content -->
<div class="page">
  <div class="proxy-title" id="proxy-title">Endless Proxy</div>
 
  <div class="search-wrap">
    <div class="search-bar-wrap">
      <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input id="search-input" type="text" placeholder="Search Google or type a URL" autocomplete="off" spellcheck="false">
      <button id="search-clear" title="Clear">✕</button>
    </div>
    <div id="suggestions"></div>
  </div>
 
  <div class="shortcuts" id="shortcuts-container"></div>
 
  <button id="add-shortcut-btn" title="Add shortcut">
    <span>+</span> Add shortcut
  </button>
 
<!-- MIMS Portal Tab Panel -->
<div id="mims-panel" style="display:none;position:relative;z-index:5;flex:1;width:100%;height:100%;">
  <iframe id="mims-iframe" style="width:100%;height:100%;border:none;display:block;" src="about:blank" allow="fullscreen; autoplay; keyboard" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock allow-popups-to-escape-sandbox"></iframe>
</div>
 
</div>
 
<script>
// ═══════════════════════════════════════════
//  CITYSCAPE CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById('city-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initBuildings(); initRain(); });
 
const buildings = [];
function initBuildings() {
  buildings.length = 0;
  const W = canvas.width, H = canvas.height;
  const count = Math.floor(W / 28);
  for (let i = 0; i < count; i++) {
    const w = 18 + Math.random() * 40, h = H * 0.2 + Math.random() * H * 0.55;
    buildings.push({ x: (i/count)*W + Math.random()*12-6, w, h,
      color: Math.random() > 0.5 ? '#061428' : '#040e1c', windows: genWindows(w, h) });
  }
}
function genWindows(bw, bh) {
  const wins = [], cols = Math.floor(bw/7), rows = Math.floor(bh/10);
  for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
    wins.push({ col:c, row:r, lit: Math.random()>0.45,
      color: Math.random()>0.6 ? '#00e5ff' : Math.random()>0.5 ? '#80d8ff' : '#0288d1',
      flicker: Math.random()>0.92 });
  return wins;
}
const drops = [];
function initRain() {
  drops.length = 0;
  for (let i=0; i<350; i++) drops.push({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    len: 8+Math.random()*22, speed: 12+Math.random()*22,
    opacity: 0.15+Math.random()*0.55, angle: 0.08+Math.random()*0.06
  });
}
initBuildings(); initRain();
let frame = 0;
function draw() {
  frame++;
  const W = canvas.width, H = canvas.height;
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#020c18'); sky.addColorStop(0.4,'#041524');
  sky.addColorStop(0.7,'#061e30'); sky.addColorStop(1,'#030d1a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  const g = ctx.createRadialGradient(W*.5,H*.38,0,W*.5,H*.38,W*.5);
  g.addColorStop(0,'rgba(0,180,255,0.07)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const pg = ctx.createRadialGradient(W*.88,H*.3,0,W*.88,H*.3,W*.25);
  pg.addColorStop(0,'rgba(255,0,120,0.06)'); pg.addColorStop(1,'transparent');
  ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
  buildings.forEach(b => {
    const baseY=H*.85, bx=b.x, by=baseY-b.h;
    ctx.fillStyle=b.color; ctx.fillRect(bx,by,b.w,b.h);
    ctx.strokeStyle='rgba(0,200,255,0.06)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,b.w,b.h);
    b.windows.forEach(win => {
      if (!win.lit) return;
      if (win.flicker && (frame%90<3||frame%150>145)) return;
      ctx.fillStyle=win.color;
      ctx.globalAlpha=0.55+0.3*Math.sin(frame*0.02+win.col);
      ctx.fillRect(bx+3+win.col*7, by+5+win.row*10, 4, 5);
      ctx.globalAlpha=1;
    });
    ctx.fillStyle='rgba(0,229,255,0.04)'; ctx.fillRect(bx,by,b.w,2);
  });
  const ground=H*.85;
  const rg=ctx.createLinearGradient(0,ground,0,H);
  rg.addColorStop(0,'rgba(0,229,255,0.12)'); rg.addColorStop(0.3,'rgba(0,100,180,0.08)'); rg.addColorStop(1,'#010810');
  ctx.fillStyle=rg; ctx.fillRect(0,ground,W,H-ground);
  ctx.lineCap='round';
  drops.forEach(d => {
    ctx.beginPath(); ctx.strokeStyle=`rgba(160,220,255,${d.opacity})`; ctx.lineWidth=0.7;
    ctx.moveTo(d.x,d.y); ctx.lineTo(d.x+d.len*Math.sin(d.angle),d.y+d.len); ctx.stroke();
    d.y+=d.speed; d.x+=d.speed*Math.sin(d.angle);
    if (d.y>H) { d.y=-d.len; d.x=Math.random()*W; }
  });
  requestAnimationFrame(draw);
}
draw();
 
// ═══════════════════════════════════════════
//  TAB MANAGER
// ═══════════════════════════════════════════
const MIMS_TAB = { id: 999, title: 'MIMS Portal', active: false, fixed: true };
let tabs = JSON.parse(localStorage.getItem('ep_tabs') || 'null') || [
  { id: 1, title: 'Endless Proxy', active: true }
];
if (!tabs.find(t => t.id === 999)) tabs.splice(1, 0, MIMS_TAB);
let activeTabId = tabs.find(t=>t.active)?.id || 1;
const safeTabs = tabs.filter(t=>t.id!==999);
let nextTabId = (safeTabs.length ? Math.max(...safeTabs.map(t=>t.id)) : 1) + 1;
 
function saveTabs() { localStorage.setItem('ep_tabs', JSON.stringify(tabs)); }
 
const tabBarEl = document.getElementById('tab-bar');
const addBtn = document.getElementById('btn-new-tab');
 
function renderTabs() {
  tabBarEl.querySelectorAll('.tab').forEach(el => el.remove());
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? '' : ' tab-inactive');
    el.dataset.id = tab.id;
    const isMims = tab.id === 999;
    const faviconHTML = isMims
      ? `<div class="tab-favicon" style="background:rgba(0,229,255,0.25)"><svg viewBox="0 0 24 24" style="width:10px;height:10px;fill:#020a12"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>`
      : `<div class="tab-favicon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>`;
    const pinHTML = isMims
      ? `<span style="font-size:9px;opacity:0.5;flex-shrink:0;" title="Pinned">📌</span>`
      : `<div class="tab-close" data-id="${tab.id}" title="Close tab">✕</div>`;
    el.innerHTML = `${faviconHTML}<span class="tab-title">${tab.title}</span>${pinHTML}`;
    el.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) return;
      switchTab(tab.id);
    });
    el.querySelector('.tab-title').addEventListener('dblclick', e => {
      if (isMims) return;
      e.stopPropagation();
      const input = document.createElement('input');
      input.value = tab.title;
      input.style.cssText = 'background:transparent;border:none;outline:none;color:rgba(255,255,255,0.85);font-family:Rajdhani,sans-serif;font-size:12px;width:100%;';
      el.querySelector('.tab-title').replaceWith(input);
      input.focus(); input.select();
      const finish = () => { tab.title = input.value.trim() || 'New Tab'; saveTabs(); renderTabs(); };
      input.addEventListener('blur', finish);
      input.addEventListener('keydown', e => {
        if (e.key==='Enter') input.blur();
        if (e.key==='Escape') { input.value=tab.title; input.blur(); }
      });
    });
    const closeBtn = el.querySelector('.tab-close');
    if (closeBtn) closeBtn.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });
    tabBarEl.insertBefore(el, addBtn);
  });
}
 
function switchTab(id) {
  tabs.forEach(t => t.active = t.id === id);
  activeTabId = id;
  saveTabs(); renderTabs();
  const mimsPanel = document.getElementById('mims-panel');
  const pageEl = document.querySelector('.page');
  if (id === 999) {
    if (pageEl) pageEl.style.display = 'none';
    if (mimsPanel) {
      mimsPanel.style.display = 'block';
      const ifrm = document.getElementById('mims-iframe');
      if (ifrm && !ifrm.dataset.loaded) {
        ifrm.dataset.loaded = '1';
        const tmpl = document.getElementById('mims-source');
        if (tmpl) {
          const mimsContent = tmpl.textContent || tmpl.innerHTML || '';
          if (mimsContent.trim()) {
            try {
              const blob = new Blob([mimsContent], {type:'text/html'});
              ifrm.src = URL.createObjectURL(blob);
            } catch(e) {
              ifrm.srcdoc = mimsContent;
            }
          }
        }
      }
    }
  } else {
    if (mimsPanel) mimsPanel.style.display = 'none';
    if (pageEl) pageEl.style.display = '';
  }
}
 
function closeTab(id) {
  if (id === 999) { showToast('MIMS Portal tab is pinned'); return; }
  if (tabs.filter(t=>t.id!==999).length === 1) { showToast("Can't close last tab"); return; }
  const idx = tabs.findIndex(t=>t.id===id);
  tabs = tabs.filter(t=>t.id!==id);
  if (activeTabId === id) {
    const next = tabs[Math.min(idx, tabs.length-1)];
    tabs.forEach(t => t.active = t.id===next.id);
    activeTabId = next.id;
  }
  saveTabs(); renderTabs();
  switchTab(activeTabId);
}
 
if (addBtn) addBtn.addEventListener('click', () => {
  const newTab = { id: nextTabId++, title: 'New Tab', active: false };
  tabs.push(newTab);
  saveTabs();
  switchTab(newTab.id);
});
 
renderTabs();
 
// Apply correct initial panel state
(function applyInitialTab() {
  const mimsPanel = document.getElementById('mims-panel');
  const pageEl = document.querySelector('.page');
  if (activeTabId === 999) {
    if (pageEl) pageEl.style.display = 'none';
    if (mimsPanel) {
      mimsPanel.style.display = 'block';
      const ifrm = document.getElementById('mims-iframe');
      if (ifrm && !ifrm.dataset.loaded) {
        ifrm.dataset.loaded = '1';
        const tmpl = document.getElementById('mims-source');
        if (tmpl) {
          const mimsContent = tmpl.textContent || tmpl.innerHTML || '';
          if (mimsContent.trim()) {
            try {
              const blob = new Blob([mimsContent], {type:'text/html'});
              ifrm.src = URL.createObjectURL(blob);
            } catch(e) {
              ifrm.srcdoc = mimsContent;
            }
          }
        }
      }
    }
  } else {
    if (mimsPanel) mimsPanel.style.display = 'none';
    if (pageEl) pageEl.style.display = '';
  }
})();
 
// ═══════════════════════════════════════════
//  SHORTCUTS
// ═══════════════════════════════════════════
const DEFAULT_SHORTCUTS = [
  { id:1, label:'Downloads', url:'chrome://downloads', icon:'S', type:'letter' },
  { id:2, label:'Downloads', url:'chrome://downloads', icon:'S', type:'letter' },
  { id:3, label:'Google Search', url:'https://google.com', type:'google' },
  { id:4, label:'Google', url:'https://www.google.com', type:'google' },
  { id:5, label:'Bing Search', url:'https://www.bing.com', type:'bing' }
];
let shortcuts = JSON.parse(localStorage.getItem('ep_shortcuts') || 'null') || DEFAULT_SHORTCUTS;
let nextId = Math.max(...shortcuts.map(s=>s.id)) + 1;
function saveShortcuts() { localStorage.setItem('ep_shortcuts', JSON.stringify(shortcuts)); }
 
function googleGSVG() {
  return `<svg viewBox="0 0 48 48" width="28" height="28"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.32-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.68 28.18A13.97 13.97 0 0110.9 24c0-1.45.25-2.86.78-4.18v-5.7H4.34A23.93 23.93 0 002 24c0 3.86.92 7.51 2.34 10.88l7.34-6.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 13.12l7.34 5.7c1.74-5.2 6.59-9.07 12.32-9.07z"/></svg>`;
}
function bingSVG() {
  return `<svg viewBox="0 0 24 24" width="26" height="26"><path fill="#3b9ce5" d="M5 3l4 1.5v12.3l4.3-2.5-1.8-1.1 2.8-5.9L20 9.8 12.8 21 5 17.3z"/></svg>`;
}
function faviconIcon(url) {
  try {
    const domain = new URL(url).hostname;
    return `<img src="https://www.google.com/s2/favicons?sz=32&domain=${domain}" width="28" height="28" onerror="this.outerHTML='<span style=font-size:18px>🌐</span>'">`;
  } catch { return `<span style="font-size:18px">🌐</span>`; }
}
function shortcutIconHTML(s) {
  if (s.type==='google') return googleGSVG();
  if (s.type==='bing') return bingSVG();
  if (s.type==='letter') return `<div class="icon-sw">${s.icon||'?'}</div>`;
  if (s.type==='favicon') return faviconIcon(s.url);
  return `<span style="font-size:18px">🌐</span>`;
}
function renderShortcuts() {
  const container = document.getElementById('shortcuts-container');
  if (!container) return;
  container.innerHTML = '';
  shortcuts.forEach(s => {
    const el = document.createElement('div');
    el.className = 'shortcut';
    el.dataset.id = s.id;
    el.innerHTML = `<div class="shortcut-icon">${shortcutIconHTML(s)}</div><span class="shortcut-label">${s.label}</span>`;
    el.addEventListener('click', e => { if (!e.defaultPrevented) navigateTo(s.url); });
    el.addEventListener('contextmenu', e => showCtxMenu(e, s.id));
    container.appendChild(el);
    rippleSetup(el);
  });
}
renderShortcuts();
 
function navigateTo(url) {
  let target = url.trim();
  if (!target) return;
  if (!target.startsWith('http') && !target.startsWith('chrome://') && !target.includes('://')) target = 'https://' + target;
  window.location.href = target;
}
 
function rippleSetup(el) {
  el.addEventListener('mousedown', e => {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    el.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });
}
 
// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const suggestionsEl = document.getElementById('suggestions');
const navAddressText = document.getElementById('nav-address-text');
 
const quickSuggestions = [
  { text:'google.com', url:'https://google.com' },
  { text:'youtube.com', url:'https://youtube.com' },
  { text:'github.com', url:'https://github.com' },
  { text:'reddit.com', url:'https://reddit.com' },
  { text:'twitter.com', url:'https://twitter.com' },
  { text:'wikipedia.org', url:'https://wikipedia.org' },
];
 
if (searchInput) {
  searchInput.addEventListener('input', () => {
    const val = searchInput.value.trim();
    if (searchClear) searchClear.style.opacity = val ? '1' : '0';
    if (navAddressText) navAddressText.textContent = val || 'Search with Google or enter address';
    showSuggestions(val);
  });
  searchInput.addEventListener('keydown', e => {
    if (e.key==='Enter') {
      const val = searchInput.value.trim(); if (!val) return;
      hideSuggestions();
      if (val.includes('.') && !val.includes(' ')) navigateTo(val);
      else window.location.href = `https://www.google.com/search?q=${encodeURIComponent(val)}`;
    }
    if (e.key==='Escape') { hideSuggestions(); searchInput.blur(); }
    if (e.key==='ArrowDown') {
      const items = suggestionsEl ? suggestionsEl.querySelectorAll('.suggestion-item') : [];
      if (items.length) { items[0].focus(); e.preventDefault(); }
    }
  });
}
if (searchClear) {
  searchClear.addEventListener('click', () => {
    if (searchInput) { searchInput.value = ''; searchInput.focus(); }
    searchClear.style.opacity = '0';
    if (navAddressText) navAddressText.textContent = 'Search with Google or enter address';
    hideSuggestions();
  });
}
const _navAddrBar = document.getElementById('nav-address-bar');
if (_navAddrBar) _navAddrBar.addEventListener('click', () => { if (searchInput) searchInput.focus(); });
const _btnSearch = document.getElementById('btn-search-icon');
if (_btnSearch) _btnSearch.addEventListener('click', () => { if (searchInput) searchInput.focus(); });
 
function showSuggestions(val) {
  if (!val || !suggestionsEl) { hideSuggestions(); return; }
  const filtered = quickSuggestions.filter(s=>s.text.includes(val.toLowerCase()));
  const searchSugg = { text:`Search Google for "${val}"`, url:`https://www.google.com/search?q=${encodeURIComponent(val)}`, isSearch:true };
  const all = [searchSugg, ...filtered].slice(0,6);
  suggestionsEl.innerHTML = all.map(s=>`
    <div class="suggestion-item" tabindex="0" data-url="${s.url}">
      ${s.isSearch

//  CONTEXT MENU
// ═══════════════════════════════════════════
const ctxMenu = document.getElementById('ctx-menu');
let ctxTargetId = null;
function showCtxMenu(e, id) {
  if (!ctxMenu) return;
  e.preventDefault(); ctxTargetId=id;
  ctxMenu.style.left = Math.min(e.clientX, innerWidth-160) + 'px';
  ctxMenu.style.top = Math.min(e.clientY, innerHeight-80) + 'px';
  ctxMenu.style.display = 'block';
  requestAnimationFrame(() => ctxMenu.style.opacity = '1');
}
function hideCtxMenu() {
  if (!ctxMenu) return;
  ctxMenu.style.opacity = '0';
  setTimeout(() => ctxMenu.style.display='none', 150);
}
document.addEventListener('click', hideCtxMenu);
const _ce = document.getElementById('ctx-edit');

const _cr = document.getElementById('ctx-remove');

});

//  MODAL
// ═══════════════════════════════════════════
const modalOverlay = document.getElementById('modal-overlay');
const modalName = document.getElementById('modal-name');
const modalUrl = document.getElementById('modal-url');
let editingId = null;
 
function openModal(s) {
  if (!modalOverlay || !modalName || !modalUrl) return;
  editingId = s ? s.id : null;
  const titleEl = document.getElementById('modal-title');
  if (titleEl) titleEl.textContent = s ? 'Edit Shortcut' : 'Add Shortcut';
  modalName.value = s ? s.label : '';
  modalUrl.value = s ? s.url : '';

  requestAnimationFrame(() => modalOverlay.style.opacity = '1');

}
function closeModal() {
  if (!modalOverlay) return;
  modalOverlay.style.opacity = '0';
  setTimeout(() => modalOverlay.style.display='none', 200);
}
 
const _mc = document.getElementById('modal-cancel');
if (_mc) _mc.addEventListener('click', closeModal);

const _ms = document.getElementById('modal-save');
if (_ms) _ms.addEventListener('click', () => {

  if (editingId) {
    const s = shortcuts.find(x=>x.id===editingId);

  } else {
    shortcuts.push({ id: nextId++, label:name, url, type:'favicon' });
  }

  showToast(editingId ? 'Shortcut updated!' : 'Shortcut added!');
});
 
[modalName, modalUrl].filter(Boolean).forEach(inp => inp.addEventListener('keydown', e => {
  if (e.key==='Enter') { if (_ms) _ms.click(); }
  if (e.key==='Escape') closeModal();
}));
 
const _ab = document.getElementById('add-shortcut-btn');
if (_ab) _ab.addEventListener('click', () => openModal(null));
 
// ═══════════════════════════════════════════
//  NAV BUTTONS
// ═══════════════════════════════════════════
const _br = document.getElementById('btn-reload');
if (_br) _br.addEventListener('click', () => {
  _br.style.transform = 'rotate(360deg)';
  _br.style.transition = 'transform 0.5s ease';
  setTimeout(() => { _br.style.transform=''; _br.style.transition=''; location.reload(); }, 500);
});
const _bb = document.getElementById('btn-back');
if (_bb) _bb.addEventListener('click', () => history.back());
const _bf = document.getElementById('btn-forward');
if (_bf) _bf.addEventListener('click', () => history.forward());
 
// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.className = 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className='', 2500);
}
 
// ═══════════════════════════════════════════
//  TITLE DOUBLE-CLICK → RESET
// ═══════════════════════════════════════════
const _pt = document.getElementById('proxy-title');
if (_pt) _pt.addEventListener('dblclick', () => {
  if (confirm('Reset all shortcuts to default?')) {
    shortcuts = JSON.parse(JSON.stringify(DEFAULT_SHORTCUTS));
    saveShortcuts(); renderShortcuts(); showToast('Shortcuts reset to default');
  }
});
</script>
